<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zambia Police · Occurrence Book</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Source+Code+Pro:wght@400;600;700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --navy: #00204a; --navy2: #0a2f6b;
    --gold: #c8992a; --gold-light: #f0c040;
    --cream: #f9f5eb; --paper: #fdf8ef;
    --ink: #1a1208; --muted: #6b5e45;
    --border: #c8b89a; --rule: #ddd0b8;
    --zgreen: #1a8c3a; --red: #8b1a1a;
    --shadow: rgba(0,20,60,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--navy); background-image:radial-gradient(ellipse at 20% 20%,rgba(10,47,107,0.6) 0%,transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(200,153,42,0.08) 0%,transparent 50%); min-height:100vh; font-family:'Libre Baskerville',Georgia,serif; color:var(--ink); }

  /* LOGIN */
  .login-screen { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem; }
  .login-box { background:var(--paper); border:1px solid var(--border); border-top:5px solid var(--gold); border-radius:6px; width:min(480px,100%); box-shadow:0 20px 60px rgba(0,0,0,0.5); overflow:hidden; }
  .login-header { background:linear-gradient(90deg,#1a8c3a 0%,#1a8c3a 33%,#ffffff 33%,#ffffff 55%,#0a2f8c 55%,#0a2f8c 100%); position:relative; padding:2rem; text-align:center; }
  .login-header::before { content:''; position:absolute; inset:0; background:rgba(0,0,0,0.38); pointer-events:none; }
  .login-header>* { position:relative; z-index:1; }
  .login-shield { width:64px; height:64px; margin:0 auto 1rem; background:linear-gradient(145deg,var(--gold-light),var(--gold)); clip-path:polygon(50% 0%,100% 18%,100% 65%,50% 100%,0% 65%,0% 18%); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 14px rgba(200,153,42,0.5); }
  .login-shield i { color:var(--navy); font-size:1.8rem; }
  .login-header h1 { font-family:'IM Fell English',serif; font-size:1.3rem; color:white; letter-spacing:3px; text-transform:uppercase; text-shadow:0 2px 8px rgba(0,0,0,0.8); }
  .login-header p { color:rgba(255,255,255,0.85); font-size:0.75rem; letter-spacing:2px; margin-top:4px; text-shadow:0 1px 4px rgba(0,0,0,0.7); }
  .login-body { padding:2rem; }
  .login-body h2 { font-family:'Source Code Pro',monospace; font-size:0.8rem; letter-spacing:2px; text-transform:uppercase; color:var(--navy2); margin-bottom:1.5rem; border-bottom:1px solid var(--rule); padding-bottom:0.8rem; }
  .login-error { background:#fce8e8; border:1px solid #e0a0a0; border-left:3px solid var(--red); color:var(--red); padding:0.6rem 0.9rem; border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.8rem; margin-bottom:1rem; display:none; }
  .login-error.show { display:block; }
  .lgroup { margin-bottom:1.2rem; }
  .lgroup label { display:block; font-family:'Source Code Pro',monospace; font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--navy2); margin-bottom:5px; }
  .lgroup label i { margin-right:5px; color:var(--gold); }
  .lgroup input,.lgroup select { width:100%; padding:0.65rem 0.9rem; border:1px solid var(--border); border-radius:3px; font-family:'Libre Baskerville',serif; font-size:0.9rem; background:white; color:var(--ink); outline:none; transition:0.15s; }
  .lgroup input:focus,.lgroup select:focus { border-color:var(--navy2); box-shadow:0 0 0 3px rgba(10,47,107,0.1); }
  .login-btn { width:100%; padding:0.75rem; background:linear-gradient(90deg,var(--navy2),var(--navy)); color:white; border:2px solid var(--gold); border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.9rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; cursor:pointer; transition:0.2s; margin-top:0.5rem; }
  .login-btn:hover { background:var(--gold); color:var(--navy); }

  #app { display:none; }

  /* TOPBAR */
  .topbar { background:linear-gradient(90deg,#1a8c3a 0%,#1a8c3a 33%,#ffffff 33%,#ffffff 55%,#0a2f8c 55%,#0a2f8c 100%); border-bottom:4px solid var(--gold); padding:0.6rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
  .topbar::before { content:''; position:absolute; inset:0; background:linear-gradient(90deg,rgba(0,0,0,0.30) 0%,rgba(0,0,0,0.18) 33%,rgba(0,0,0,0.08) 33%,rgba(0,0,0,0.08) 55%,rgba(0,0,0,0.25) 55%,rgba(0,0,0,0.25) 100%); pointer-events:none; z-index:0; }
  .topbar>* { position:relative; z-index:1; }
  .topbar-left { display:flex; align-items:center; gap:1rem; }
  .shield-wrap { width:52px; height:52px; background:linear-gradient(145deg,var(--gold-light),var(--gold)); clip-path:polygon(50% 0%,100% 18%,100% 65%,50% 100%,0% 65%,0% 18%); display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(200,153,42,0.5); }
  .shield-wrap i { color:var(--navy); font-size:1.4rem; }
  .force-title { color:white; }
  .force-title h1 { font-family:'IM Fell English',serif; font-size:1.3rem; letter-spacing:3px; text-transform:uppercase; line-height:1.2; text-shadow:0 1px 6px rgba(0,0,0,0.7),0 0 2px rgba(0,0,0,0.9); }
  .force-title span { font-size:0.65rem; color:#b8860b; letter-spacing:2px; text-transform:uppercase; font-family:'Source Code Pro',monospace; text-shadow:0 1px 4px rgba(0,0,0,0.6); }
  .topbar-center { font-family:'Source Code Pro',monospace; color:#fff; font-size:0.85rem; text-align:center; line-height:1.6; text-shadow:0 1px 4px rgba(0,0,0,0.55); }
  #liveClock { font-size:1.6rem; font-weight:700; letter-spacing:4px; }
  .topbar-right { display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }
  .session-pill { background:rgba(0,0,0,0.4); border:1px solid rgba(255,255,255,0.4); border-radius:20px; padding:0.3rem 0.9rem; font-family:'Source Code Pro',monospace; font-size:0.75rem; color:white; display:flex; align-items:center; gap:6px; text-shadow:0 1px 3px rgba(0,0,0,0.6); }
  .role-dot { width:7px; height:7px; border-radius:50%; background:var(--gold-light); flex-shrink:0; }
  .role-dot.admin { background:#ff9f40; }
  .role-dot.officer { background:#7edb8f; }
  .nav-btn { background:rgba(0,0,0,0.35); border:1px solid rgba(255,255,255,0.5); color:rgba(255,255,255,0.95); padding:0.4rem 0.9rem; border-radius:4px; font-size:0.78rem; letter-spacing:1px; cursor:pointer; font-family:'Source Code Pro',monospace; transition:0.2s; text-transform:uppercase; text-shadow:0 1px 3px rgba(0,0,0,0.6); }
  .nav-btn:hover,.nav-btn.active { background:var(--gold); color:var(--navy); border-color:var(--gold); font-weight:700; text-shadow:none; }
  .nav-btn.admin-only { border-color:rgba(255,159,64,0.7); }
  .nav-btn.admin-only:hover { background:#ff9f40; color:var(--navy); border-color:#e08020; }
  .nav-btn i { margin-right:5px; }

  .main { max-width:1440px; margin:0 auto; padding:1.5rem; }

  /* PANELS */
  .panel { background:var(--paper); border-radius:4px; box-shadow:0 8px 32px var(--shadow),0 2px 0 var(--gold); overflow:hidden; margin-bottom:1.5rem; border:1px solid var(--border); }
  .panel-header { background:linear-gradient(90deg,var(--navy2),var(--navy)); color:white; padding:0.9rem 1.5rem; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); }
  .panel-header h2 { font-family:'IM Fell English',serif; font-size:1rem; letter-spacing:2px; text-transform:uppercase; }
  .panel-header h2 i { color:var(--gold-light); margin-right:8px; }
  .panel-header .badge { background:var(--gold); color:var(--navy); font-family:'Source Code Pro',monospace; font-size:0.75rem; font-weight:700; padding:2px 10px; border-radius:20px; }
  .panel-header .admin-badge { background:#ff9f40; color:var(--navy); font-family:'Source Code Pro',monospace; font-size:0.72rem; font-weight:700; padding:2px 10px; border-radius:20px; }

  /* STATS */
  .stats-strip { display:flex; background:var(--cream); border-bottom:1px solid var(--rule); }
  .stat-card { flex:1; padding:1rem 1.5rem; border-right:1px solid var(--rule); text-align:center; }
  .stat-card:last-child { border-right:none; }
  .stat-num { font-family:'Source Code Pro',monospace; font-size:2rem; font-weight:700; color:var(--navy2); line-height:1; }
  .stat-label { font-size:0.68rem; color:var(--muted); text-transform:uppercase; letter-spacing:1.5px; margin-top:4px; }
  .stat-card.highlight .stat-num { color:var(--gold); }

  /* FILTER BAR */
  .filter-bar { padding:0.9rem 1.5rem; display:flex; gap:0.8rem; align-items:center; background:var(--cream); border-bottom:1px solid var(--rule); flex-wrap:wrap; }
  .search-wrap { flex:1 1 220px; position:relative; }
  .search-wrap i { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:0.85rem; }
  .search-wrap input { width:100%; padding:0.5rem 0.5rem 0.5rem 2rem; border:1px solid var(--border); border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.85rem; background:white; color:var(--ink); outline:none; }
  .search-wrap input:focus { border-color:var(--navy2); box-shadow:0 0 0 2px rgba(10,47,107,0.15); }
  .filter-select { padding:0.5rem 0.8rem; border:1px solid var(--border); border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.82rem; background:white; color:var(--ink); outline:none; cursor:pointer; }
  .filter-label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; }
  .btn-sm { padding:0.45rem 0.9rem; border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.8rem; cursor:pointer; border:1px solid; letter-spacing:0.5px; transition:0.15s; white-space:nowrap; }
  .btn-navy { background:var(--navy2); color:white; border-color:var(--navy); }
  .btn-navy:hover { background:var(--navy); }
  .btn-red { background:var(--red); color:white; border-color:#600; }
  .btn-red:hover { background:#a02020; }
  .btn-outline { background:white; color:var(--navy2); border-color:var(--border); }
  .btn-outline:hover { border-color:var(--navy2); }

  /* TABLE */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  thead th { background:#e8e0d0; color:var(--navy); font-family:'Source Code Pro',monospace; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; padding:10px 12px; border-bottom:2px solid var(--border); border-right:1px solid var(--rule); white-space:nowrap; text-align:left; cursor:pointer; user-select:none; }
  thead th:hover { background:#ddd4c0; }
  thead th .sort-icon { opacity:0.4; margin-left:4px; font-size:0.65rem; }
  thead th.sorted .sort-icon { opacity:1; color:var(--gold); }
  thead th:last-child { border-right:none; cursor:default; }
  tbody tr { border-bottom:1px solid var(--rule); transition:background 0.12s; }
  tbody tr:hover { background:rgba(10,47,107,0.04); }
  tbody tr:last-child { border-bottom:none; }
  td { padding:11px 12px; vertical-align:top; border-right:1px solid var(--rule); color:var(--ink); }
  td:last-child { border-right:none; }
  .entry-num { font-family:'Source Code Pro',monospace; font-weight:700; font-size:0.95rem; color:var(--navy); white-space:nowrap; display:flex; align-items:center; gap:6px; }
  .entry-dot { width:8px; height:8px; border-radius:50%; background:var(--gold); flex-shrink:0; }
  .time-badge { font-family:'Source Code Pro',monospace; font-weight:600; font-size:0.9rem; background:var(--navy); color:var(--gold-light); padding:3px 8px; border-radius:3px; white-space:nowrap; display:inline-block; }
  .offence-tag { display:inline-block; padding:3px 10px; border-radius:3px; font-size:0.8rem; font-weight:700; letter-spacing:0.5px; text-transform:uppercase; border-left:3px solid; }
  .tag-theft   { background:#fff3e0; color:#c45000; border-color:#e07000; }
  .tag-assault { background:#fce8e8; color:var(--red); border-color:var(--red); }
  .tag-traffic { background:#e8f0fe; color:#1a3a7c; border-color:#2040a0; }
  .tag-domestic{ background:#f3e8ff; color:#5b2d8c; border-color:#7b4daa; }
  .tag-fraud   { background:#e8f5e9; color:var(--zgreen); border-color:var(--zgreen); }
  .tag-other   { background:#f0ede6; color:var(--muted); border-color:var(--border); }
  .occurrence-text { max-width:360px; line-height:1.55; font-family:'Libre Baskerville',serif; font-size:0.85rem; color:#2a2010; }
  .officer-badge { display:inline-flex; align-items:center; gap:6px; background:white; border:1px solid var(--border); padding:4px 10px; border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.8rem; font-weight:600; color:var(--navy2); white-space:nowrap; }
  .officer-badge i { color:var(--gold); font-size:0.75rem; }
  .action-btns { display:flex; gap:5px; }
  .act-btn { width:28px; height:28px; border-radius:3px; border:1px solid var(--border); background:white; cursor:pointer; font-size:0.75rem; color:var(--muted); display:flex; align-items:center; justify-content:center; transition:0.15s; }
  .act-btn:hover { background:var(--navy2); color:white; border-color:var(--navy2); }
  .act-btn.del:hover { background:var(--red); border-color:var(--red); }

  /* FORM */
  .entry-form-wrap { padding:1.5rem; }
  .form-grid { display:grid; grid-template-columns:120px 1fr 2fr 1fr; gap:1rem; align-items:start; margin-bottom:1rem; }
  @media(max-width:900px){ .form-grid { grid-template-columns:1fr 1fr; } }
  @media(max-width:560px){ .form-grid { grid-template-columns:1fr; } }
  .fgroup label { display:block; font-family:'Source Code Pro',monospace; font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--navy2); margin-bottom:5px; }
  .fgroup label i { margin-right:5px; color:var(--gold); }
  .fgroup input,.fgroup textarea,.fgroup select { width:100%; padding:0.6rem 0.8rem; border:1px solid var(--border); border-radius:3px; font-family:'Libre Baskerville',serif; font-size:0.88rem; background:white; color:var(--ink); outline:none; transition:0.15s; }
  .fgroup input:focus,.fgroup textarea:focus,.fgroup select:focus { border-color:var(--navy2); box-shadow:0 0 0 3px rgba(10,47,107,0.1); }
  .fgroup textarea { resize:vertical; min-height:80px; font-family:'Libre Baskerville',serif; }
  .form-footer { display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:1rem; }
  .form-hint { font-family:'Source Code Pro',monospace; font-size:0.75rem; color:var(--muted); }
  .form-hint i { color:var(--gold); margin-right:5px; }
  .submit-btn { background:linear-gradient(90deg,var(--navy2),var(--navy)); color:white; border:2px solid var(--gold); padding:0.65rem 1.8rem; border-radius:3px; font-family:'Source Code Pro',monospace; font-size:0.9rem; font-weight:700; letter-spacing:2px; cursor:pointer; transition:0.2s; text-transform:uppercase; display:flex; align-items:center; gap:10px; box-shadow:0 4px 12px var(--shadow); }
  .submit-btn:hover { background:var(--gold); color:var(--navy); transform:translateY(-1px); }

  /* ADMIN */
  .officers-grid { padding:1.5rem; }
  .officers-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
  .officers-table th { background:#e8e0d0; color:var(--navy); font-family:'Source Code Pro',monospace; font-size:0.72rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; padding:10px 12px; border-bottom:2px solid var(--border); text-align:left; }
  .officers-table td { padding:11px 12px; border-bottom:1px solid var(--rule); vertical-align:middle; }
  .officers-table tr:last-child td { border-bottom:none; }
  .role-badge { display:inline-block; padding:2px 10px; border-radius:20px; font-family:'Source Code Pro',monospace; font-size:0.75rem; font-weight:700; text-transform:uppercase; }
  .role-admin   { background:#fff0e0; color:#a04000; border:1px solid #e07000; }
  .role-officer { background:#e8f5e9; color:#1a5c2a; border:1px solid #2a8c3a; }
  .add-officer-form { background:var(--cream); border:1px solid var(--rule); border-radius:4px; padding:1.2rem 1.5rem; margin:1rem 1.5rem 1.5rem; }
  .add-officer-form h3 { font-family:'Source Code Pro',monospace; font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--navy2); margin-bottom:1rem; border-bottom:1px solid var(--rule); padding-bottom:0.5rem; }
  .add-officer-form h3 i { color:var(--gold); margin-right:6px; }
  .officer-form-row { display:grid; grid-template-columns:1fr 1fr 1fr 140px; gap:0.8rem; align-items:end; }
  @media(max-width:700px){ .officer-form-row { grid-template-columns:1fr 1fr; } }

  /* MODAL */
  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,10,30,0.7); z-index:200; align-items:center; justify-content:center; backdrop-filter:blur(3px); }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--paper); border:1px solid var(--border); border-top:4px solid var(--gold); border-radius:4px; width:min(700px,95vw); max-height:90vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,0.5); animation:slideUp 0.2s ease; }
  @keyframes slideUp { from{transform:translateY(20px);opacity:0;} to{transform:translateY(0);opacity:1;} }
  .modal-header { background:linear-gradient(90deg,var(--navy2),var(--navy)); color:white; padding:1rem 1.5rem; display:flex; align-items:center; justify-content:space-between; border-bottom:2px solid var(--gold); }
  .modal-header h3 { font-family:'IM Fell English',serif; font-size:1rem; letter-spacing:2px; }
  .modal-close { background:none; border:none; color:rgba(255,255,255,0.7); font-size:1.2rem; cursor:pointer; }
  .modal-close:hover { color:white; }
  .modal-body { padding:1.5rem; }
  .modal-field { margin-bottom:1.2rem; }
  .modal-field-label { font-family:'Source Code Pro',monospace; font-size:0.68rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--muted); margin-bottom:5px; }
  .modal-field-val { padding:0.7rem 1rem; background:white; border:1px solid var(--rule); border-radius:3px; font-family:'Libre Baskerville',serif; font-size:0.9rem; line-height:1.6; }
  .modal-footer { padding:1rem 1.5rem; border-top:1px solid var(--rule); display:flex; gap:0.5rem; justify-content:flex-end; }
  .delete-modal .modal { border-top-color:var(--red); }
  .delete-modal .modal-header { background:linear-gradient(90deg,#6b1010,#8b1a1a); border-bottom-color:#c84040; }

  /* PAGINATION */
  .pagination { padding:0.8rem 1.5rem; background:var(--cream); border-top:1px solid var(--rule); display:flex; align-items:center; justify-content:space-between; font-family:'Source Code Pro',monospace; font-size:0.8rem; color:var(--muted); flex-wrap:wrap; gap:0.5rem; }
  .page-btns { display:flex; gap:4px; }
  .page-btn { width:30px; height:30px; border:1px solid var(--border); background:white; border-radius:3px; cursor:pointer; font-family:'Source Code Pro',monospace; font-size:0.8rem; color:var(--navy2); display:flex; align-items:center; justify-content:center; transition:0.15s; }
  .page-btn:hover,.page-btn.active { background:var(--navy2); color:white; border-color:var(--navy2); }

  /* EMPTY STATE */
  .empty-state { padding:3rem; text-align:center; color:var(--muted); font-family:'IM Fell English',serif; font-size:1.1rem; }
  .empty-state i { font-size:2.5rem; margin-bottom:1rem; display:block; opacity:0.3; }
  .empty-state .start-msg { font-size:0.82rem; margin-top:0.5rem; font-family:'Source Code Pro',monospace; letter-spacing:1px; line-height:1.7; }

  /* TOAST */
  .toast-wrap { position:fixed; bottom:1.5rem; right:1.5rem; z-index:999; display:flex; flex-direction:column; gap:0.5rem; }
  .toast { background:var(--navy); color:white; padding:0.7rem 1.2rem; b
